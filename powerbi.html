<!DOCTYPE html>

<html>
<head>
<title>Power BI Dashboard</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f7fb;
}

.header{
background:#0f766e;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.page-desc{
text-align:center;
max-width:900px;
margin:15px auto;
color:#444;
font-size:15px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:30px;
}

.section{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.section h2{
color:#0f766e;
}

.card{
margin-bottom:20px;
}

.card h4{
margin:5px 0;
}

.card img{
width:100%;
border-radius:6px;
}
</style>

</head>

<body>

<div class="header">
Power BI Analytics Dashboard
</div>

<p class="page-desc">
This Power BI dashboard analyzes product sales, store performance,
customer behavior, and revenue insights. The report includes interactive
visualizations for trend analysis, cost comparison, and performance tracking.
</p>

<div class="container">

<!-- sections remain same -->

</div>

</body>
</html>
